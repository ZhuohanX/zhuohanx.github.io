<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>FinChain 小红书文案复制</title>
  <style>
    :root {
      color-scheme: light;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f6f3ee;
      color: #202124;
    }
    body {
      margin: 0;
      padding: 18px;
    }
    h1 {
      margin: 0 0 16px;
      font-size: 22px;
      line-height: 1.25;
    }
    section {
      background: #fff;
      border: 1px solid #e7e0d6;
      border-radius: 14px;
      padding: 14px;
      margin: 0 0 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,.04);
    }
    label {
      display: block;
      font-weight: 700;
      margin-bottom: 8px;
    }
    textarea {
      box-sizing: border-box;
      width: 100%;
      min-height: 72px;
      border: 1px solid #d8d2c8;
      border-radius: 10px;
      padding: 10px;
      font-size: 16px;
      line-height: 1.55;
      color: #111;
      background: #fffdf9;
      resize: vertical;
    }
    #bodyText {
      min-height: 520px;
    }
    #commentText {
      min-height: 150px;
    }
    button {
      width: 100%;
      margin-top: 10px;
      border: 0;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      background: #e64646;
    }
    .status {
      min-height: 20px;
      margin: 8px 0 0;
      color: #2f7d32;
      font-size: 14px;
    }
    .hint {
      margin: 8px 0 0;
      color: #777;
      font-size: 13px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <h1>FinChain 小红书文案复制</h1>

  <section>
    <label for="titleText">标题</label>
    <textarea id="titleText" readonly>🎉 FinChain ACL Oral｜金融AI不能只看答案</textarea>
    <button type="button" data-target="titleText">复制标题</button>
    <p class="status" id="titleTextStatus"></p>
  </section>

  <section>
    <label for="bodyText">正文 + 标签</label>
    <textarea id="bodyText" readonly>FinChain 入选 ACL 2026 Main Conference Oral。🎉
⠀
这篇 paper 关注的是一个很实际的问题：
⠀
金融 AI 里，模型给出正确答案还不够。更重要的是，它每一步推理是不是可检查、可复现、可验证。🧠
⠀
很多 financial reasoning benchmark 主要看 final answer。FinChain 把问题做成 symbolic templates：变量、公式、中间步骤和最终结果都可以由 Python traces 生成和检查。
⠀
这样评测时就不只是问“算对了吗”，还可以看：
⠀
✅ 哪一步开始错
⠀
✅ 中间结果是否一致
⠀
✅ reasoning chain 是否真的 grounded
⠀
✅ advanced tasks 里是否还能保持稳定
⠀
FinChain 覆盖 12 个 financial domains、58 个 topics，一共构造了 2,900 个 test cases。
⠀
paper 里评测了 26 个 LLMs。一个比较清楚的结论是：frontier models 整体更强，但到了更复杂的 multi-step symbolic financial reasoning，仍然会明显掉性能。⚠️
⠀
这也是 financial AI 评测里很关键的一点：high-stakes 场景不能只看答案像不像，而要看推理过程能不能被审计。
⠀
#ACL2026 #ACLOral #金融AI #大模型评测 #论文分享</textarea>
    <button type="button" data-target="bodyText">复制正文 + 标签</button>
    <p class="status" id="bodyTextStatus"></p>
    <p class="hint">这里的空行用了占位空白字符，复制到小红书后不容易被吞。</p>
  </section>

  <section>
    <label for="commentText">可选评论</label>
    <textarea id="commentText" readonly>📄 论文可以搜：
FinChain ACL 2026
⠀
后面几张图是 symbolic template、taxonomy、model results 和 difficulty breakdown。
⠀
核心问题：金融 AI 不能只看 final answer，要看 reasoning chain 是否可验证。</textarea>
    <button type="button" data-target="commentText">复制可选评论</button>
    <p class="status" id="commentTextStatus"></p>
  </section>

  <script>
    async function copyText(id) {
      const el = document.getElementById(id);
      const status = document.getElementById(id + "Status");
      el.focus();
      el.select();
      try {
        await navigator.clipboard.writeText(el.value);
        status.textContent = "已复制";
      } catch (err) {
        document.execCommand("copy");
        status.textContent = "已复制";
      }
      setTimeout(() => { status.textContent = ""; }, 1400);
    }
    document.querySelectorAll("button[data-target]").forEach((button) => {
      button.addEventListener("click", () => copyText(button.dataset.target));
    });
  </script>
</body>
</html>
